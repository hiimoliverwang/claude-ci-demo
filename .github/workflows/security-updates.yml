name: Security Updates

on:
  schedule:
    - cron: "0 6 * * 1"  # Mondays 6am UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  fix-vulnerabilities:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - name: Audit dependencies
        id: audit
        run: |
          npm audit --json > audit.json || true
          COUNT=$(jq '.metadata.vulnerabilities.total // 0' audit.json)
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          echo "report<<EOF" >> $GITHUB_OUTPUT
          npm audit || true >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Fix vulnerabilities with Claude
        if: steps.audit.outputs.count != '0'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            npm audit found ${{ steps.audit.outputs.count }} vulnerabilities.
            Read audit.json for details. Update package.json to safe versions,
            run `npm install` to regenerate the lockfile, run `npm test` to
            verify nothing breaks, then create a branch, commit, push, and
            open a PR titled "Security: bump vulnerable dependencies" with a
            summary of what was fixed.
          claude_args: |
            --allowedTools "Edit,Read,Bash(npm install:*),Bash(npm test:*),Bash(npm audit:*),Bash(git checkout:*),Bash(git add:*),Bash(git commit:*),Bash(git push:*),Bash(gh pr create:*)"
            --max-turns 15
