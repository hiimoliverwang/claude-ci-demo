name: Auto-Fix CI Failures

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  actions: read
  id-token: write

jobs:
  auto-fix:
    # Only on PR failures, and not on commits Claude already pushed (loop guard)
    if: |
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.actor.login != 'claude[bot]' &&
      github.event.workflow_run.actor.login != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - name: Get failure logs
        id: logs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh run view ${{ github.event.workflow_run.id }} --log-failed > failure.log || true
          echo "log<<EOF" >> $GITHUB_OUTPUT
          tail -100 failure.log >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Fix with Claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            CI failed on this PR. Read the failure log, identify the root cause,
            fix the code, run the tests to confirm they pass, then commit and push.

            Failure log:
            ```
            ${{ steps.logs.outputs.log }}
            ```
          claude_args: |
            --allowedTools "Edit,Read,Glob,Grep,Bash(npm test:*),Bash(npm run:*),Bash(git add:*),Bash(git commit:*),Bash(git push:*),Bash(git status:*),Bash(git diff:*)"
            --max-turns 15
